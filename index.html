<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Bradbury Building</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Step into the Bradbury Building and discover a stunning mix of history, art, and architecture that feels straight out of a movie.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #fff;
      color: #000;
    }
    header h1 {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0;
    }
    main p {
      font-family: "Playfair Display", serif;
      font-weight: 400;
      font-size: 1.2rem;
      line-height: 1.7;
      letter-spacing: 0;
    }
    img {
      display: block;
    }
    /* desktop: bigger heading */
    @media (min-width: 768px) {
      header h1 {
        font-size: 5rem;
      }
      main p {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container my-4">

    <header class="row mb-3">
      <div class="col-12">
        <h1>The Bradbury Building</h1>
      </div>
    </header>

    <main>
      <div class="row align-items-start">
        <div class="col-12 col-md-5">
          <img src="img/bb.jpg" alt="The Bradbury Building" class="img-fluid w-100">
        </div>
        <div class="col-12 col-md-7 mt-3 mt-md-0">
          <p>
            Step into the Bradbury Building and discover a stunning mix of history, art, and
            architecture that feels straight out of a movie—just a short trip from Cal State LA.
          </p>
        </div>
      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
